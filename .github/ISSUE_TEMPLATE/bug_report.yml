name: Bug Report
description: Report a bug in ZHA Firmware OTA Manager
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Please provide as much detail as possible so we can diagnose quickly.

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.5.2
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: Integration version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: zha-version
    attributes:
      label: ZHA / zigpy version
      placeholder: e.g. zha 0.0.x
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
        - Other
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Bug description
      description: What happens? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Settings → System → Logs (filter by "zha_firmware").
      render: shell
