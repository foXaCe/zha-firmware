name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What need is not covered?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
