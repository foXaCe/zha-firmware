name: Renovate (self-hosted)

# Runs Renovate against this repository without the hosted GitHub App.
# Reads renovate.json from the repo. Trigger on demand via the Actions tab or
# `gh workflow run renovate.yml`, plus a weekly schedule.
#
# Note: PRs created with the default GITHUB_TOKEN do NOT trigger other workflows
# (a GitHub limitation), so CI won't run on Renovate PRs and automerge will not
# complete. For full automation, install the hosted Renovate app
# (https://github.com/apps/renovate) or provide a PAT as the RENOVATE_TOKEN
# secret and reference it below instead of GITHUB_TOKEN.

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: Log level
        type: choice
        options: [info, debug]
        default: info
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: renovatebot/github-action@v46.1.17
        with:
          # Prefers a PAT (RENOVATE_TOKEN) with `repo` + `workflow` scopes so
          # Renovate can update workflow files and trigger CI on its PRs.
          # Falls back to GITHUB_TOKEN, which cannot modify .github/workflows/*.
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: "false"
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
