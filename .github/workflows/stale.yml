name: Stale

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: stale-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,help wanted,good first issue"
          exempt-pr-labels: "pinned,security,dependencies"
          stale-issue-message: >-
            Cette issue est inactive depuis 60 jours. Sans activité, elle sera
            fermée dans 14 jours.
          stale-pr-message: >-
            Cette PR est inactive depuis 60 jours. Sans activité, elle sera
            fermée dans 14 jours.
