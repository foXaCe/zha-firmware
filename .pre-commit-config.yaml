---
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

# Note: mypy is intentionally NOT a pre-commit hook. Building its environment
# with Home Assistant as a dependency exceeds prek's environment size tier
# (~520 MiB). mypy --strict runs in CI (ci.yml) and via `scripts/lint`, where
# Home Assistant is installed normally.
